events { worker_connections 1024; }

http {
    include mime.types;
    default_type application/octet-stream;
    sendfile on;
    client_max_body_size 500M;

    server {
        listen 80;

        location /health {
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        # APK-Downloads werden direkt von Nginx ausgeliefert (sendfile),
        # nicht durch FastAPI. Dateinamen sind serverseitig generierte
        # UUIDs, daher kein Risiko durch Path-Traversal ueber Nutzereingaben.
        location /data/apks/ {
            alias /app/data/apks/;
            add_header Content-Disposition "attachment";
        }

        location /data/icons/ {
            alias /app/data/icons/;
            expires 7d;
        }

        location /static/ {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            expires 1d;
        }

        location / {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }
    }
}
