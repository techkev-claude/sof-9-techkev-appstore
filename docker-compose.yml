services:
  backend:
    build: ./backend
    container_name: techkev-appstore-backend
    restart: unless-stopped
    environment:
      - ADMIN_USER=${ADMIN_USER}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - API_KEY=${API_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - DB_PATH=${DB_PATH}
      - APK_MAX_SIZE_MB=${APK_MAX_SIZE_MB}
    volumes:
      - "${DATA_PATH}:/app/data"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    expose:
      - "8000"

  nginx:
    build: ./nginx
    container_name: techkev-appstore-nginx
    restart: unless-stopped
    ports:
      - "${PORT}:80"
    depends_on:
      - backend
    volumes:
      - "${DATA_PATH}:/app/data:ro"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
